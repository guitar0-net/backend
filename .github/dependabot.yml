version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "main"

    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "UTC"

    open-pull-requests-limit: 10
    rebase-strategy: "auto"

    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "chore(deps)"

    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"

    labels:
      - "dependencies"
      - "ci"

    commit-message:
      prefix: "chore(deps)"

    groups:
      github-actions:
        patterns: ["*"]
